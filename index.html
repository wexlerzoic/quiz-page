<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>礦坑冒險問答事件頁</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top, #2d3a4b 0%, #18212b 45%, #0e141b 100%);
      color: #f5f1e8;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    .title-box {
      text-align: center;
      margin-bottom: 20px;
    }

    .title-box h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: 1px;
    }

    .title-box p {
      margin: 0;
      color: #cfd8e3;
      line-height: 1.6;
    }

    .panel {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(6px);
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .mid-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.2rem;
      color: #ffe5a6;
    }

    .dice-box {
      text-align: center;
      padding: 12px 0;
    }

    .dice-face {
      font-size: 5rem;
      line-height: 1;
      margin: 8px 0 12px;
    }

    .dice-number {
      font-size: 1.4rem;
      font-weight: bold;
      color: #fff1c7;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .primary-btn {
      background: #ffd36b;
      color: #2a1b00;
    }

    .secondary-btn {
      background: #91b8ff;
      color: #0d213f;
    }

    .danger-btn {
      background: #e79a9a;
      color: #3a1111;
    }

    .success-btn {
      background: #9fe0b1;
      color: #10301a;
    }

    .event-card {
      min-height: 260px;
      line-height: 1.8;
    }

    .event-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .chance-badge {
      background: rgba(255, 211, 107, 0.18);
      color: #ffd36b;
      border: 1px solid rgba(255, 211, 107, 0.35);
    }

    .fate-badge {
      background: rgba(145, 184, 255, 0.18);
      color: #b9d1ff;
      border: 1px solid rgba(145, 184, 255, 0.35);
    }

    .quiz-badge {
      background: rgba(159, 224, 177, 0.18);
      color: #b6f0c4;
      border: 1px solid rgba(159, 224, 177, 0.35);
    }

    .lucky {
      color: #9ff0a8;
    }

    .neutral {
      color: #f5f1e8;
    }

    .unlucky {
      color: #ffb0b0;
    }

    .story-title {
      font-size: 1.15rem;
      font-weight: bold;
      color: #fff7df;
      margin-bottom: 10px;
    }

    .effect-box {
      margin-top: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      color: #eaf3ff;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }

    .stat-item .label {
      display: block;
      color: #d9e3ef;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    .stat-item .value {
      font-size: 1.4rem;
      font-weight: bold;
      color: #fff4d6;
    }

    .loot-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .loot-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 12px;
      min-height: 82px;
    }

    .loot-slot {
      font-size: 0.92rem;
      color: #d7e0ea;
      margin-bottom: 6px;
    }

    .loot-name {
      font-weight: bold;
      color: #fff4d2;
    }

    .loot-bonus {
      font-size: 0.9rem;
      color: #b9d1ff;
      margin-top: 4px;
    }

    .quiz-box {
      line-height: 1.8;
      min-height: 260px;
    }

    .quiz-question {
      font-size: 1.15rem;
      color: #fff7df;
      margin: 10px 0 14px;
      min-height: 60px;
    }

    .quiz-answer {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(159, 224, 177, 0.10);
      color: #dffff0;
    }

    .log-box {
      margin-top: 16px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      padding: 14px;
      max-height: 220px;
      overflow-y: auto;
      line-height: 1.7;
    }

    .log-title {
      margin-bottom: 10px;
      color: #ffe5a6;
      font-weight: bold;
    }

    .log-entry {
      margin-bottom: 8px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
      padding-bottom: 8px;
    }

    .tip {
      margin-top: 18px;
      color: #cdd8e3;
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .top-grid,
      .mid-grid,
      .bottom-grid,
      .status-grid,
      .loot-grid {
        grid-template-columns: 1fr;
      }

      .dice-face {
        font-size: 4.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box">
      <h1>礦坑冒險問答事件頁</h1>
      <p>
        每回合先擲骰，再觸發機會、命運與一道題目。<br>
        故事會往前走，命運會左右搖晃，而題目像一道窄橋，逼你踩著理解通過。
      </p>
    </div>

    <div class="top-grid">
      <div class="panel">
        <h2 class="section-title">本回合操作</h2>
        <div class="dice-box">
          <div id="diceFace" class="dice-face">🎲</div>
          <div id="diceNumber" class="dice-number">尚未擲骰</div>
        </div>

        <div class="button-row">
          <button class="primary-btn" onclick="nextTurn()">開始回合</button>
          <button class="secondary-btn" onclick="rollOnly()">只擲骰子</button>
          <button class="danger-btn" onclick="resetGame()">重新開始</button>
        </div>

        <div class="tip">
          按下「開始回合」後，會自動完成：<br>
          擲骰 → 機會 → 命運 → 抽題
        </div>
      </div>

      <div class="panel">
        <h2 class="section-title">角色狀態</h2>
        <div id="statusStats" class="status-grid"></div>
        <div id="lootArea" class="loot-grid"></div>
      </div>
    </div>

    <div class="mid-grid">
      <div class="panel event-card">
        <div class="event-badge chance-badge">機會</div>
        <div id="chanceContent">
          <div class="story-title">尚未觸發機會事件</div>
          <div>按下「開始回合」後，故事會朝下一張機會卡前進。</div>
        </div>
      </div>

      <div class="panel event-card">
        <div class="event-badge fate-badge">命運</div>
        <div id="fateContent">
          <div class="story-title">尚未觸發命運事件</div>
          <div>命運像礦坑裡的側風，不一定大，但總會讓火光歪一點。</div>
        </div>
      </div>
    </div>

    <div class="bottom-grid">
      <div class="panel quiz-box">
        <div class="event-badge quiz-badge">題目</div>
        <div id="quizContent">
          <div class="story-title">尚未抽出題目</div>
          <div class="quiz-question">按下「開始回合」後，這裡會隨機出現一道題目。</div>
          <div id="quizAnswer" class="quiz-answer"></div>
        </div>

        <div class="button-row" style="justify-content:flex-start;">
          <button class="success-btn" onclick="showAnswer()">顯示答案</button>
          <button class="secondary-btn" onclick="newQuestion()">再抽一題</button>
        </div>
      </div>

      <div class="panel">
        <div class="log-title">回合紀錄</div>
        <div id="logBox" class="log-box"></div>
      </div>
    </div>
  </div>

  <script>
    const defaultPlayer = {
      hp: 10,
      atk: 2,
      steps: 0,
      loot: {
        helmet: null,
        armor: null,
        pants: null,
        gloves: null,
        boots: null,
        weapon: null
      }
    };

    let player = structuredClone(defaultPlayer);
    let currentDice = null;
    let chanceIndex = 0;
    let turnCount = 0;
    let currentQuestion = null;

    const diceFaces = {
      1: "⚀",
      2: "⚁",
      3: "⚂",
      4: "⚃",
      5: "⚄",
      6: "⚅"
    };

    const lootSlotNames = {
      helmet: "頭盔",
      armor: "衣甲",
      pants: "褲甲",
      gloves: "手套",
      boots: "戰靴",
      weapon: "武器"
    };

    const quizData = [
      {
        question: "2X - 3 = 0，X = ?",
        answer: "X = 1.5"
      },
      {
        question: "7 × 6 = ?",
        answer: "42"
      },
      {
        question: "台灣的首都是哪裡？",
        answer: "台北市"
      },
      {
        question: "水的化學式是什麼？",
        answer: "H₂O"
      },
      {
        question: "10 - 4 = ?",
        answer: "6"
      },
      {
        question: "9 ÷ 3 = ?",
        answer: "3"
      }
    ];

    const chanceEvents = [
      {
        title: "礦坑入口的火光",
        story: "你在礦坑入口看見搖晃的火光，一位老工人沉默地替你指出較安全的道路。這不是神諭，比較像一種經驗慢慢沉積後留下的善意。",
        effectByDice: {
          1: "你謹慎前進，步伐 +1",
          2: "你獲得補給，生命值 +1",
          3: "你精神一振，攻擊力 +1",
          4: "你看見捷徑，步伐 +2",
          5: "你獲得舊礦靴，步伐 +2，並裝備戰靴",
          6: "你找到礦工鐵鎬，攻擊力 +2，並裝備武器"
        },
        applyEffect(dice) {
          if (dice === 1) player.steps += 1;
          if (dice === 2) player.hp += 1;
          if (dice === 3) player.atk += 1;
          if (dice === 4) player.steps += 2;
          if (dice === 5) {
            player.steps += 2;
            equipLoot("boots", { name: "舊礦靴", bonus: "步伐 +2" });
          }
          if (dice === 6) {
            player.atk += 2;
            equipLoot("weapon", { name: "礦工鐵鎬", bonus: "攻擊力 +2" });
          }
        }
      },
      {
        title: "被遺忘的補給箱",
        story: "沿著殘壁搜索時，你在石縫後發現一個補給箱。箱蓋已經歪斜，但內容物還保有一種硬撐著不想散掉的整齊。",
        effectByDice: {
          1: "只找到少量乾糧，生命值 +1",
          2: "找到皮手套，攻擊力 +1，並裝備手套",
          3: "找到簡易衣甲，生命值 +1，並裝備衣甲",
          4: "找到可用地圖，步伐 +2",
          5: "補給充足，生命值 +2",
          6: "補給齊全，生命值 +2、攻擊力 +1"
        },
        applyEffect(dice) {
          if (dice === 1) player.hp += 1;
          if (dice === 2) {
            player.atk += 1;
            equipLoot("gloves", { name: "皮手套", bonus: "攻擊力 +1" });
          }
          if (dice === 3) {
            player.hp += 1;
            equipLoot("armor", { name: "簡易衣甲", bonus: "生命值 +1" });
          }
          if (dice === 4) player.steps += 2;
          if (dice === 5) player.hp += 2;
          if (dice === 6) {
            player.hp += 2;
            player.atk += 1;
          }
        }
      },
      {
        title: "前人的留言",
        story: "石壁上刻著一句被時間磨得幾乎斷裂的提醒：『真正的寶藏常藏在危險之後。』那字跡像風化的骨頭，卻仍讓人心頭一震。",
        effectByDice: {
          1: "你受到鼓舞，攻擊力 +1",
          2: "你穩住心神，生命值 +1",
          3: "你調整節奏，步伐 +1、攻擊力 +1",
          4: "你看破陷阱，步伐 +2",
          5: "你找到礦石頭盔，生命值 +2，並裝備頭盔",
          6: "你理解了路線，步伐 +3"
        },
        applyEffect(dice) {
          if (dice === 1) player.atk += 1;
          if (dice === 2) player.hp += 1;
          if (dice === 3) {
            player.steps += 1;
            player.atk += 1;
          }
          if (dice === 4) player.steps += 2;
          if (dice === 5) {
            player.hp += 2;
            equipLoot("helmet", { name: "礦石頭盔", bonus: "生命值 +2" });
          }
          if (dice === 6) player.steps += 3;
        }
      },
      {
        title: "礦車軌道的分岔",
        story: "老舊軌道在前方分岔，一側向著黑暗深處，一側蜿蜒繞行。你停下腳步時，連空氣都像在等你選邊站。",
        effectByDice: {
          1: "你保守選路，步伐 +1",
          2: "你小心試探，步伐 +1、生命值 +1",
          3: "你找到厚革褲甲，生命值 +1，並裝備褲甲",
          4: "你決定抄近路，步伐 +2",
          5: "你找出礦坑節奏，步伐 +2、攻擊力 +1",
          6: "你精準判斷路線，步伐 +3、生命值 +1"
        },
        applyEffect(dice) {
          if (dice === 1) player.steps += 1;
          if (dice === 2) {
            player.steps += 1;
            player.hp += 1;
          }
          if (dice === 3) {
            player.hp += 1;
            equipLoot("pants", { name: "厚革褲甲", bonus: "生命值 +1" });
          }
          if (dice === 4) player.steps += 2;
          if (dice === 5) {
            player.steps += 2;
            player.atk += 1;
          }
          if (dice === 6) {
            player.steps += 3;
            player.hp += 1;
          }
        }
      },
      {
        title: "回到獵寮前的整備",
        story: "在通往獵寮的途中，你稍作停留，整理裝備與呼吸。這一段不是高潮，卻像故事收束前那一下安靜但必要的深呼吸。",
        effectByDice: {
          1: "你重新站穩，生命值 +1",
          2: "你修整武器，攻擊力 +1",
          3: "你整頓步伐，步伐 +1、生命值 +1",
          4: "你收拾遺留物，攻擊力 +1、步伐 +1",
          5: "你找到完整戰靴，步伐 +2，並裝備戰靴",
          6: "你以最佳狀態整備完成，生命值 +2、攻擊力 +1、步伐 +1"
        },
        applyEffect(dice) {
          if (dice === 1) player.hp += 1;
          if (dice === 2) player.atk += 1;
          if (dice === 3) {
            player.steps += 1;
            player.hp += 1;
          }
          if (dice === 4) {
            player.atk += 1;
            player.steps += 1;
          }
          if (dice === 5) {
            player.steps += 2;
            equipLoot("boots", { name: "完整戰靴", bonus: "步伐 +2" });
          }
          if (dice === 6) {
            player.hp += 2;
            player.atk += 1;
            player.steps += 1;
          }
        }
      }
    ];

    const fateEvents = {
      lucky: [
        {
          level: "真幸運！",
          css: "lucky",
          text: "你踩到隱藏升降台，被直接送往前方。",
          apply() {
            player.steps += 3;
          }
        },
        {
          level: "真幸運！",
          css: "lucky",
          text: "你撿到保存完好的武器，鋒口竟然還在發光。",
          apply() {
            player.atk += 2;
            equipLoot("weapon", { name: "鋼鐵短刃", bonus: "攻擊力 +2" });
          }
        },
        {
          level: "真幸運！",
          css: "lucky",
          text: "你在碎石堆中找到珍貴藥劑，身體立刻回暖。",
          apply() {
            player.hp += 2;
          }
        }
      ],
      neutral: [
        {
          level: "沒事就是好事",
          css: "neutral",
          text: "前方原本可能坍塌，但你剛好避開了。什麼都沒賺到，但也什麼都沒失去。",
          apply() {}
        },
        {
          level: "沒事就是好事",
          css: "neutral",
          text: "你雖然繞了一小段遠路，但最後沒有損失。",
          apply() {}
        },
        {
          level: "沒事就是好事",
          css: "neutral",
          text: "你聽見野獸低鳴，幸好牠今天對你沒有興趣。",
          apply() {}
        }
      ],
      unlucky: [
        {
          level: "不幸中的大幸",
          css: "unlucky",
          text: "你踩空滑了一段，但只受了輕傷。",
          apply() {
            player.hp -= 1;
            clampPlayerStats();
          }
        },
        {
          level: "不幸中的大幸",
          css: "unlucky",
          text: "你的武器撞上岩壁，攻擊節奏被打亂。",
          apply() {
            player.atk -= 1;
            clampPlayerStats();
          }
        },
        {
          level: "不幸中的大幸",
          css: "unlucky",
          text: "你被迫後退整隊，腳步被吞掉了幾格。",
          apply() {
            player.steps -= 2;
            clampPlayerStats();
          }
        },
        {
          level: "不幸中的大幸",
          css: "unlucky",
          text: "你慌亂中丟失一件護具，但至少沒有丟掉命。",
          apply() {
            removeRandomLoot();
          }
        }
      ]
    };

    function clampPlayerStats() {
      if (player.hp < 0) player.hp = 0;
      if (player.atk < 0) player.atk = 0;
      if (player.steps < 0) player.steps = 0;
    }

    function equipLoot(slot, item) {
      player.loot[slot] = item;
    }

    function removeRandomLoot() {
      const ownedSlots = Object.keys(player.loot).filter(slot => player.loot[slot] !== null);

      if (ownedSlots.length === 0) {
        player.hp = Math.max(0, player.hp - 1);
        addLog("命運反手一推，因為你沒有可失去的裝備，所以改為生命值 -1。");
        return;
      }

      const randomSlot = ownedSlots[Math.floor(Math.random() * ownedSlots.length)];
      const lostItem = player.loot[randomSlot];
      player.loot[randomSlot] = null;
      addLog(`命運捲走了你的「${lostItem.name}」${lootSlotNames[randomSlot]}。`);
    }

    function rollDice() {
      currentDice = Math.floor(Math.random() * 6) + 1;
      document.getElementById("diceFace").textContent = diceFaces[currentDice];
      document.getElementById("diceNumber").textContent = `本回合骰子：${currentDice}`;
      return currentDice;
    }

    function rollOnly() {
      rollDice();
      addLog(`你單純擲出了骰子 ${currentDice}。暫時還沒有推進回合。`);
    }

    function drawChance() {
      const chanceContent = document.getElementById("chanceContent");

      if (chanceIndex >= chanceEvents.length) {
        chanceContent.innerHTML = `
          <div class="story-title">機會卡池已走到底</div>
          <div>故事主線暫時告一段落。你可以重新開始，或自行到程式裡繼續擴寫新的機會事件。</div>
          <div class="effect-box"><strong>提示：</strong>到 <code>const chanceEvents = [ ... ]</code> 裡新增事件即可。</div>
        `;
        addLog("機會卡池已經沒有新卡了。");
        return;
      }

      const event = chanceEvents[chanceIndex];
      event.applyEffect(currentDice);

      chanceContent.innerHTML = `
        <div class="story-title">${event.title}</div>
        <div>${event.story}</div>
        <div class="effect-box"><strong>骰子效果：</strong>${event.effectByDice[currentDice]}</div>
      `;

      addLog(`機會【${event.title}】觸發。骰子 ${currentDice}，效果是：${event.effectByDice[currentDice]}`);
      chanceIndex += 1;
    }

    function drawFate() {
      const fateContent = document.getElementById("fateContent");
      const rand = Math.random();
      let pool;

      if (rand < 0.25) {
        pool = fateEvents.lucky;
      } else if (rand < 0.7) {
        pool = fateEvents.neutral;
      } else {
        pool = fateEvents.unlucky;
      }

      const event = pool[Math.floor(Math.random() * pool.length)];
      event.apply();
      clampPlayerStats();

      fateContent.innerHTML = `
        <div class="story-title ${event.css}">${event.level}</div>
        <div>${event.text}</div>
      `;

      addLog(`命運【${event.level}】降臨。內容是：${event.text}`);
    }

    function newQuestion() {
      if (quizData.length === 0) {
        document.getElementById("quizContent").innerHTML = `
          <div class="story-title">題庫是空的</div>
          <div class="quiz-question">請到 <code>const quizData = [ ... ]</code> 裡新增題目。</div>
          <div id="quizAnswer" class="quiz-answer"></div>
        `;
        return;
      }

      const randomIndex = Math.floor(Math.random() * quizData.length);
      currentQuestion = quizData[randomIndex];

      document.getElementById("quizContent").innerHTML = `
        <div class="story-title">本回合題目</div>
        <div class="quiz-question">${currentQuestion.question}</div>
        <div id="quizAnswer" class="quiz-answer">${currentQuestion.answer}</div>
      `;

      addLog(`抽到題目：${currentQuestion.question}`);
    }

    function showAnswer() {
      const answerBox = document.getElementById("quizAnswer");
      if (!answerBox) return;
      answerBox.style.display = "block";
    }

    function updateStatus() {
      document.getElementById("statusStats").innerHTML = `
        <div class="stat-item">
          <span class="label">❤️ 生命值</span>
          <span class="value">${player.hp}</span>
        </div>
        <div class="stat-item">
          <span class="label">⚔️ 攻擊力</span>
          <span class="value">${player.atk}</span>
        </div>
        <div class="stat-item">
          <span class="label">👣 步伐數</span>
          <span class="value">${player.steps}</span>
        </div>
      `;

      document.getElementById("lootArea").innerHTML = renderLootItems();
    }

    function renderLootItems() {
      const slots = [
        { key: "helmet", emoji: "🪖" },
        { key: "armor", emoji: "🛡️" },
        { key: "pants", emoji: "🥾" },
        { key: "gloves", emoji: "🧤" },
        { key: "boots", emoji: "👢" },
        { key: "weapon", emoji: "🗡️" }
      ];

      return slots.map(slot => {
        const item = player.loot[slot.key];
        return `
          <div class="loot-item">
            <div class="loot-slot">${slot.emoji} ${lootSlotNames[slot.key]}</div>
            <div class="loot-name">${item ? item.name : "無"}</div>
            <div class="loot-bonus">${item ? item.bonus : "尚未裝備"}</div>
          </div>
        `;
      }).join("");
    }

    function addLog(text) {
      const logBox = document.getElementById("logBox");
      const entry = document.createElement("div");
      entry.className = "log-entry";
      entry.textContent = `第 ${turnCount} 回合｜${text}`;
      logBox.prepend(entry);
    }

    function nextTurn() {
      turnCount += 1;
      rollDice();
      drawChance();
      drawFate();
      newQuestion();
      updateStatus();
    }

    function resetGame() {
      player = structuredClone(defaultPlayer);
      currentDice = null;
      chanceIndex = 0;
      turnCount = 0;
      currentQuestion = null;

      document.getElementById("diceFace").textContent = "🎲";
      document.getElementById("diceNumber").textContent = "尚未擲骰";

      document.getElementById("chanceContent").innerHTML = `
        <div class="story-title">尚未觸發機會事件</div>
        <div>按下「開始回合」後，故事會朝下一張機會卡前進。</div>
      `;

      document.getElementById("fateContent").innerHTML = `
        <div class="story-title">尚未觸發命運事件</div>
        <div>命運像礦坑裡的側風，不一定大，但總會讓火光歪一點。</div>
      `;

      document.getElementById("quizContent").innerHTML = `
        <div class="story-title">尚未抽出題目</div>
        <div class="quiz-question">按下「開始回合」後，這裡會隨機出現一道題目。</div>
        <div id="quizAnswer" class="quiz-answer"></div>
      `;

      document.getElementById("logBox").innerHTML = "";
      updateStatus();
    }

    updateStatus();
  </script>
</body>
</html>
